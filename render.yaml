services:
  - type: web
    name: medidiag-pro
    env: python
    plan: free
    buildCommand: "pip install -r requirements.txt && python train_ensemble.py"
    startCommand: "gunicorn wsgi:app"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PYTHONIOENCODING
        value: utf-8
